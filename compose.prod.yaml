# PICO — Production overlay. Extends compose.yaml with the bits a
# reviewer-machine stack never needs:
#
#   - Caddy reverse-proxy labels (the `caddy` MCP container in `infra/`
#     watches for these and routes <API_HOST> / <FRONTEND_HOST> onto the
#     API + frontend containers). Both hostnames are read from .env so
#     this overlay stays hostname-agnostic.
#   - Caddy `flush_interval: -1` flush disables so streaming responses work
#   - `ingress` external network so the caddy MCP container can resolve
#     pico-api / pico-frontend by container name.
#   - Pinned container_name + volume names so the (single) production
#     state survives `docker compose down` (no `-v`) and rebuilds without
#     surprises.
#   - PROVISIONING_MODE=docker defaults for the live backend.
#
# Activate by either:
#   $env:COMPOSE_FILE = "compose.yaml:compose.prod.yaml"   # powershell
#   COMPOSE_FILE=compose.yaml:compose.prod.yaml docker compose up -d --build
#
# or by setting the variable in .env (see .env.example).
# Required env vars:
#   API_HOST      — public hostname for the API (e.g. pico-api.example.com)
#   FRONTEND_HOST — public hostname for the frontend (e.g. pico.example.com)

name: pico

# Services declared in compose.yaml; this overlay only adds fields to the
# existing services (under `services.<name>` keys) and adds a network.
services:
  postgres:
    container_name: pico-postgres
    # Postgres lives on the same `pico_net` as the API and frontend so the
    # embedded DNS resolver (127.0.0.11) inside the API can resolve
    # `postgres` by container name. Without this, the API container sits
    # only on `pico_net` + `ingress` (per the overlay) and the default
    # `pico_default` network's DNS records are invisible to it.
    networks:
      - pico_net

  api:
    container_name: pico-api
    environment:
      PROVISIONING_MODE: ${PROVISIONING_MODE:-docker}
    networks:
      - pico_net
      - ingress
    labels:
      # Primary + optional Cloudflare tunnel aliases (comma-separated).
      # Set API_HOST in .env to the primary, and API_HOST_ALT to any
      # tunnel alias. When API_HOST_ALT is empty, the trailing comma
      # is harmless — CDP ignores empty segments.
      # e.g. caddy: pico-api.aamar.cloud, pico-api.ski.bd
      caddy: ${API_HOST:?API_HOST required}, ${API_HOST_ALT:-}
      caddy.reverse_proxy: "{{upstreams 8080}}"

  frontend:
    container_name: pico-frontend
    networks:
      - pico_net
      - ingress
    labels:
      # Primary + optional Cloudflare tunnel aliases (comma-separated).
      # e.g. caddy: pico.aamar.cloud, pico.ski.bd
      caddy: ${FRONTEND_HOST:?FRONTEND_HOST required}, ${FRONTEND_HOST_ALT:-}
      caddy.reverse_proxy: "{{upstreams 3000}}"
      caddy.reverse_proxy.flush_interval: "-1"

volumes:
  # Override the project-prefixed volume declared in compose.yaml with a
  # fixed, known-good name. Combined with `name: pico` above, this is the
  # one volume the production deployment uses — every docker compose
  # command from this repo reuses it.
  pico-postgres-data:
    name: pico-postgres-data
  # Persist ASP.NET Core's data-protection keys across API container
  # restarts. Without this, every API bounce wipes the in-container key
  # ring and login fails with 403 "antiforgery token could not be
  # decrypted" because the browser's existing Pico.Antiforgery cookie
  # can no longer be decrypted. Pinned name keeps the keys around for
  # the lifetime of the deployment. Matches Platform sibling pattern.
  pico-api-dpkeys:
    name: pico-api-dpkeys

networks:
  pico_net:
    name: pico_net
  ingress:
    external: true
