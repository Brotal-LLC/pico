# PICO — Self-Service Cloud Module — Local development Compose file.
#
# Reviewer workflow:
#   cp .env.example .env
#   docker compose up --build
#   open http://localhost:3000
#   login with demo@pico.local / pico-demo-password
#
# Production overlays this file with compose.prod.yaml:
#   COMPOSE_FILE=compose.yaml:compose.prod.yaml docker compose up --build
# When both files are loaded, compose.prod.yaml layers Caddy labels, the
# ingress network, and pinned container / volume names on top of the
# services declared here.
#
# This file alone (no overlay) is a fully self-contained reviewer stack:
#   - mock provisioning backend (no Docker socket required)
#   - localhost:3000 / localhost:8080 ports exposed directly
#   - CORS allowed origin = http://localhost:3000
#   - cookie domain = empty (cookies scoped to the exact API host)
#   - default project network (no name pinning, so multiple reviewers on
#     the same machine each get isolated volumes / networks)
#
# Recovery: if you ever see "password authentication failed for user pico",
# the Postgres volume was initialised with a different password. Run:
#   docker compose down -v && docker compose up --build
# The `-v` deletes the stale data volume and lets it be reinitialised
# with whatever POSTGRES_PASSWORD is in .env.

name: pico-dev

services:
  postgres:
    image: postgres:16-alpine
    # No container_name: each reviewer gets their own (project-prefixed)
    # container, so two reviewers on the same host don't collide.
    mem_limit: 1g
    cpus: "1.00"
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pico}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      POSTGRES_DB: ${POSTGRES_DB:-pico}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      # Project-prefixed volume name: each reviewer / test clone gets its
      # own isolated data directory. Eliminates the "stale password" trap
      # entirely — a reviewer who previously ran a different shell
      # cannot infect this run.
      - pico-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pico} -d ${POSTGRES_DB:-pico}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile.prod
    image: pico-api:local
    # No container_name in dev: lets multiple clones coexist on one host.
    mem_limit: 2g
    cpus: "2.00"
    restart: unless-stopped
    ports:
      - "${API_PORT:-8080}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: Host=postgres;Port=5432;Database=${POSTGRES_DB:-pico};Username=${POSTGRES_USER:-pico};Password=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      Database__AutoMigrate: "true"
      Database__SeedDemoData: "true"
      # Default: mock provisioning so a reviewer can run without Docker
      # socket access. Production overrides this via compose.prod.yaml.
      PROVISIONING_MODE: ${PROVISIONING_MODE:-mock}
      OpenStack__AuthUrl: ${OpenStack__AuthUrl:-http://192.168.122.43:5000/v3}
      OpenStack__Username: ${OpenStack__Username:-admin}
      OpenStack__Password: ${OpenStack__Password:-}
      OpenStack__ProjectName: ${OpenStack__ProjectName:-admin}
      OpenStack__Region: ${OpenStack__Region:-RegionOne}
      # Default: localhost:3000 so a fresh `docker compose up --build`
      # on a reviewer's machine works out of the box. Production overrides
      # this via .env to the actual public hostname. To allow both at
      # once, set Cors__AllowedOrigins to a comma-separated list.
      Cors__AllowedOrigins: ${Cors__AllowedOrigins:-http://localhost:3000}
      # Default: empty (cookies scoped to the exact API host). Production
      # can leave this empty too — once the cookie-Domain attribute is
      # omitted entirely, the browser scopes cookies to whichever host
      # issued them.
      Cookie__Domain: ${Cookie__Domain:-}
      DOCKER_HOST: ${DOCKER_HOST:-unix:///var/run/docker.sock}
    volumes:
      # Default: docker socket mounted read-only so the API can talk to
      # Docker for the docker provisioning mode. Mock mode (the dev
      # default) does not need this, but a reviewer who overrides to
      # PROVISIONING_MODE=docker will. The example file uses a harmless
      # /dev/null mount so the default composes cleanly even without a
      # real socket.
      - ${DOCKER_SOCKET_MOUNT:-/dev/null:/dev/null:ro}
    group_add:
      - "973"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      # Generous start_period covers the cold-boot path: the database
      # healthcheck wait + EF migration + DataSeeder. On a fresh volume
      # the seeder runs the catalog, two users, one resource, and three
      # invoices. 60s is comfortable for any reasonable reviewer laptop
      # while keeping the failure signal crisp when something is genuinely
      # wrong.
      start_period: 60s
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        # Default: localhost:8080 so a fresh `docker compose up --build`
        # on a reviewer's machine works out of the box. Production
        # overrides this via .env to the public API hostname.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    image: pico-frontend:local
    mem_limit: 2g
    cpus: "2.00"
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
      API_URL: http://api:8080
      NODE_ENV: production
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      api:
        condition: service_healthy

volumes:
  # Project-prefixed (no `name:` override), so each reviewer / test clone
  # gets its own isolated volume. Production pins the name in
  # compose.prod.yaml.
  pico-postgres-data:
