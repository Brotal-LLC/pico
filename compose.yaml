name: pico

# PICO — Self-Service Cloud Module
# Single-file Docker Compose for self-contained reviewer experience.
# Run: docker compose up --build
#
# Stack:
#   postgres  - PostgreSQL 16 (data persistence)
#   api       - .NET 10 backend (Minimal API, EF Core, provisioning engine)
#   frontend  - Next.js 16 frontend (App Router, TanStack Query)
#
# Networking:
#   - Internal: all services on `pico_net` (auto-created)
#   - External: Caddy reverse proxy on `ingress` network
#     exposes pico.aamar.cloud (frontend) and pico-api.aamar.cloud (API)
#   - For local-only runs (no Caddy), ports are exposed directly.

services:
  postgres:
    image: postgres:16-alpine
    container_name: pico-postgres
    mem_limit: 1g
    cpus: "1.00"
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pico}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      POSTGRES_DB: ${POSTGRES_DB:-pico}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - pico-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pico} -d ${POSTGRES_DB:-pico}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - pico_net

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile.dev
    container_name: pico-api
    mem_limit: 2g
    cpus: "2.00"
    restart: unless-stopped
    ports:
      - "${API_PORT:-8080}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: Host=postgres;Port=5432;Database=${POSTGRES_DB:-pico};Username=${POSTGRES_USER:-pico};Password=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      Database__AutoMigrate: "true"
      Database__SeedDemoData: "true"
      PROVISIONING_MODE: ${PROVISIONING_MODE:-mock}
      OpenStack__AuthUrl: ${OpenStack__AuthUrl:-http://192.168.122.43:5000/v3}
      OpenStack__Username: ${OpenStack__Username:-admin}
      OpenStack__Password: ${OpenStack__Password:-}
      OpenStack__ProjectName: ${OpenStack__ProjectName:-admin}
      OpenStack__Region: ${OpenStack__Region:-RegionOne}
      Cors__AllowedOrigins: ${Cors__AllowedOrigins:-https://pico.aamar.cloud}
      Cookie__Domain: ${Cookie__Domain:-.aamar.cloud}
      DOCKER_HOST: ${DOCKER_HOST:-unix:///var/run/docker.sock}
      DOTNET_USE_POLLING_FILE_WATCHER: "1"
      DOTNET_WATCH_SUPPRESS_EMOJIS: "1"
    volumes:
      - .:/workspace
      - ${HOME}/.nuget/packages:/home/pixu/.nuget/packages
      - ${DOCKER_SOCKET_MOUNT:-/dev/null:/dev/null:ro}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - pico_net
      - ingress
    labels:
      caddy: pico-api.aamar.cloud
      caddy.reverse_proxy: "{{upstreams 8080}}"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://pico-api.aamar.cloud}
    container_name: pico-frontend
    mem_limit: 2g
    cpus: "2.00"
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://pico-api.aamar.cloud}
      API_URL: http://api:8080
      NODE_ENV: production
    depends_on:
      - api
    networks:
      - pico_net
      - ingress
    labels:
      caddy: pico.aamar.cloud
      caddy.reverse_proxy: "{{upstreams 3000}}"
      caddy.reverse_proxy.flush_interval: "-1"

volumes:
  pico-postgres-data:
    name: pico-postgres-data
  frontend-node-modules:
    name: pico-frontend-node-modules

networks:
  pico_net:
    name: pico_net
  ingress:
    external: true